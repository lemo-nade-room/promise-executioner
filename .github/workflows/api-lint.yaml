name: Lint API

on:
  pull_request:
    paths:
      - '.github/workflows/api-lint.yaml'
      - 'api/.swiftlint.yml'
      - 'api/**/*.swift'

jobs:
  SwiftLint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: GitHub Action for SwiftLint (Only files changed in the PR)
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict
        env:
          WORKING_DIRECTORY: api