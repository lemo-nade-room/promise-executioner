name: Deploy Worker
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/proxy-deploy.yaml'
      - 'proxy-cloudflare-worker/src/**/*.ts'
      - 'proxy-cloudflare-worker/package.json'
      - 'proxy-cloudflare-worker/bun.lockb'
      - 'proxy-cloudflare-worker/wrangler.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Build & Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "proxy-cloudflare-worker"