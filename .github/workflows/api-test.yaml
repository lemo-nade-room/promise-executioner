name: Test API

on:
  pull_request:
    paths:
      - '.github/workflows/api-test.yaml'
      - 'api/**/*.swift'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          key: swift-build-package-resolved-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('api/Package.resolved') }}
          path: ./api/.build

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"

      - run: swift build

      - run: swift test