name: Check proxy format
on:
  pull_request:
    paths:
      - '.github/workflows/proxy-format.yaml'
      - 'proxy-cloudflare-worker/**/*.ts'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./proxy-cloudflare-worker
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run fmt-check